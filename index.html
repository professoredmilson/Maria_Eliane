<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Meu Sonho</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fa;
    font-family:Arial, sans-serif;
}

h1{
    color:#0d6efd;
    text-align:center;
    margin:20px 0;
}

#texto{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    font-size:1.3rem;
    line-height:1.8;
    max-height:500px;
    overflow-y:auto;
}

.frase{
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.frase:hover{
    background:#eef5ff;
}

.ativo{
    background:#ffeb3b;
    font-weight:bold;
}

.controles{
    text-align:center;
    margin-bottom:20px;
}

.gif-container{
    text-align:center;
    margin-top:30px;
}

.gif-container img{
    max-width:100%;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="container py-3">

<h1>Meu Sonho</h1>

<div class="controles">

<button class="btn btn-success"
onclick="playPause()">
▶ Reproduzir / Pausar
</button>

<button class="btn btn-primary"
onclick="aumentarTexto()">
A+
</button>

<button class="btn btn-secondary"
onclick="reduzirTexto()">
A-
</button>

</div>

<audio id="audio" src="Maria Eliane Final.mp3"></audio>

<div id="texto"></div>

<div class="gif-container">
    <img src="severina-1 (1).gif">
</div>

</div>

<script>

const audio = document.getElementById("audio");
const textoDiv = document.getElementById("texto");

let tamanhoFonte = 1.3;
let legendas = [];

function playPause(){

    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

function aumentarTexto(){
    tamanhoFonte += 0.1;
    textoDiv.style.fontSize = tamanhoFonte + "rem";
}

function reduzirTexto(){

    tamanhoFonte -= 0.1;

    if(tamanhoFonte < 0.9)
        tamanhoFonte = 0.9;

    textoDiv.style.fontSize = tamanhoFonte + "rem";
}

function converterTempo(t){

    let partes = t.split(":");

    let horas = parseInt(partes[0]);
    let minutos = parseInt(partes[1]);

    let segundos = parseFloat(partes[2]);

    return horas*3600 + minutos*60 + segundos;
}

fetch("captions.sbv")
.then(resp => resp.text())
.then(conteudo => {

    const blocos = conteudo.trim().split("\n\n");

    blocos.forEach(bloco => {

        const linhas = bloco.split("\n");

        if(linhas.length >= 2){

            const tempos = linhas[0].split(",");

            const inicio =
                converterTempo(tempos[0]);

            const fim =
                converterTempo(tempos[1]);

            const texto =
                linhas.slice(1).join(" ");

            legendas.push({
                inicio,
                fim,
                texto
            });
        }
    });

    exibirLegendas();
});

function exibirLegendas(){

    textoDiv.innerHTML = "";

    legendas.forEach((item, indice)=>{

        const p =
            document.createElement("div");

        p.className = "frase";

        p.innerText = item.texto;

        p.onclick = ()=>{

            audio.currentTime =
                item.inicio;

            audio.play();
        };

        textoDiv.appendChild(p);
    });
}

audio.addEventListener("timeupdate",()=>{

    const tempo = audio.currentTime;

    const frases =
        document.querySelectorAll(".frase");

    frases.forEach((frase,i)=>{

        frase.classList.remove("ativo");

        if(
            tempo >= legendas[i].inicio &&
            tempo <= legendas[i].fim
        ){

            frase.classList.add("ativo");

            frase.scrollIntoView({
                behavior:"smooth",
                block:"center"
            });
        }
    });

});

</script>

</body>
</html>
